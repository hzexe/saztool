name: build-windows

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/saztool-${{ matrix.goos }}-${{ matrix.goarch }}.exe ./cmd/saztool

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: saztool-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/saztool-${{ matrix.goos }}-${{ matrix.goarch }}.exe
